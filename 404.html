<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var base = "/EasyLifeTCG";
      var path = window.location.pathname.slice(base.length) || "/";
      var query = window.location.search;
      var hash = window.location.hash;
      sessionStorage.redirect = path + query + hash;
      window.location.replace(base + "/");
    </script>
  </head>
  <body></body>
</html>
